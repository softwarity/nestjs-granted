name: Unit tests
run-name: ${{ github.actor }} run unit tests on ${{ github.repository }}
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
